<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>회원 상세</title>
</head>
<body>
	<h2>회원 상세</h2>
	<form id="frm" method="post">
		<input type="hidden" name="id" th:value="${member.id}">
		아이디: <input type="text" th:value="${member.id}" readonly><br>
		비밀번호: <input type="text" name="password" th:value="${member.password}"><br>
		이름: <input type="text" name="name" th:value="${member.name}"><br>
		성별: <input type="text" name="gender" th:value="${member.gender}"><br>
		생년월일: <input type="text" name="birth" th:value="${member.birth}"><br>
		이메일: <input type="text" name="mail" th:value="${member.mail}"><br>
		연락처: <input type="text" name="phone" th:value="${member.phone}"><br>
		주소: <input type="text" name="address" th:value="${member.address}"><br>

		<button type="submit" th:formaction="@{/member/update}">수정</button>
		<button type="submit" th:formaction="@{/member/delete}">삭제</button>
	</form>
	<br>
	<a th:href="@{/member/list}"> 목록으로 </a>
</body>
</html>
